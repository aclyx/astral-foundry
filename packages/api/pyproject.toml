[project]
name = "astral-foundry-api"
version = "0.1.0"
description = "FastAPI interface for the Astral Foundry issue digest workspace."
requires-python = ">=3.12,<3.13"
dependencies = [
  "astral-foundry-core",
  "fastapi>=0.116,<0.117",
  "httpx>=0.28,<0.29",
  "pydantic>=2.11,<3",
  "uvicorn>=0.35,<0.36",
]

[build-system]
requires = ["uv_build>=0.11.2,<0.12"]
build-backend = "uv_build"

[tool.uv.sources]
"astral-foundry-core" = { workspace = true }

[tool.uv.build-backend]
module-name = "api"
module-root = "src"
